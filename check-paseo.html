<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Check Entrega — Paseo Jardines</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .header{width:100%;background:linear-gradient(135deg,#1D4F73,#3C8EC8);padding:24px 20px 20px;text-align:center;}
    .header-sub{font-size:11px;color:rgba(255,255,255,.7);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
    .header-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:2px;}
    .header-suc{font-size:14px;color:rgba(255,255,255,.85);}
    .container{width:100%;max-width:480px;padding:20px 16px;}
    .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
    .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#6B7E93;margin-bottom:12px;}
    .folio{font-size:20px;font-weight:700;color:#1D4F73;font-family:monospace;margin-bottom:4px;}
    .badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
    .badge-ord{background:rgba(46,158,107,.12);color:#2E9E6B;}
    .badge-ext{background:rgba(224,123,42,.12);color:#E07B2A;}
    .badge-asi{background:rgba(60,142,200,.12);color:#3C8EC8;}
    .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0F4F8;font-size:13px;}
    .row:last-child{border-bottom:none;}
    .row-lbl{color:#6B7E93;font-weight:600;}
    .row-val{color:#182533;font-weight:500;text-align:right;}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px;}
    .btn-entrada{background:linear-gradient(135deg,#2E9E6B,#27875c);color:#fff;}
    .btn-salida{background:linear-gradient(135deg,#E07B2A,#c4671f);color:#fff;}
    .btn:active{transform:scale(.97);}
    .status-ok{background:rgba(46,158,107,.1);border:1.5px solid #2E9E6B;border-radius:12px;padding:14px;text-align:center;margin-bottom:10px;}
    .status-done{background:rgba(29,79,115,.1);border:1.5px solid #1D4F73;border-radius:12px;padding:14px;text-align:center;margin-bottom:10px;}
    .check-row{display:flex;gap:10px;margin-bottom:12px;}
    .check-col{flex:1;background:#F8FAFE;border-radius:8px;padding:10px;text-align:center;}
    .check-col-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6B7E93;margin-bottom:4px;font-weight:700;}
    .check-col-val{font-size:15px;font-weight:700;font-family:monospace;color:#1D4F73;}
    .sdp-tab{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
    .sdp-tab-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid #E0E8F0;background:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace;color:#6B7E93;}
    .sdp-tab-btn.active{background:#1D4F73;color:#fff;border-color:#1D4F73;}
    .sdp-tab-btn.done{border-color:#2E9E6B;color:#2E9E6B;}
    .spinner{width:36px;height:36px;border:3px solid #E0E8F0;border-top-color:#3C8EC8;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .footer{text-align:center;font-size:11px;color:#9BADBF;padding:16px;}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-sub">Luna Media Café · CEDIS</div>
    <div class="header-title">Check de Entrega</div>
    <div class="header-suc">📍 Paseo Jardines</div>
  </div>
  <div class="container">
    <div id="loading" class="card" style="text-align:center;padding:40px 20px;color:#6B7E93;">
      <div class="spinner"></div>
      <div id="loading-msg">Buscando pedidos...</div>
    </div>
    <div id="content"></div>
  </div>
  <div class="footer">Luna Media Café · CEDIS · Paseo Jardines</div>
<script>
var SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbwT1N70xPfFjTf40jJ7f3gHPbzFdjKA1XdX5isBJcvwk23fB-j787huHwlNyKNoJQwkPw/exec';
var SUCURSAL    = 'Paseo Jardines';
var STORAGE_KEY = 'lmc_checks_paseo';
var pedidos     = [];
var folioActivo = null;

function getHoy() { return new Date().toISOString().split('T')[0]; }
function getHora() { return new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}); }
function getFechaHora() { return new Date().toLocaleString('es-MX',{hour12:false}); }
function fmtMoney(val) {
  var n = parseFloat(String(val).replace(/[$,]/g,''))||0;
  return '$'+n.toFixed(2).replace(/(\d)(?=(\d{3})+\.)/g,'$1,');
}
function getBadge(folio) {
  if(!folio) return '';
  if(folio.indexOf('-ASI')>=0) return '<span class="badge badge-asi">Asign.CEDIS</span>';
  if(folio.indexOf('-EXT')>=0) return '<span class="badge badge-ext">Extraordinaria</span>';
  return '<span class="badge badge-ord">Ordinaria</span>';
}
function loadChecks() {
  try {
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return {};
    var d=JSON.parse(raw);
    if(d._fecha!==getHoy()){localStorage.removeItem(STORAGE_KEY);return {};}
    return d;
  } catch(e){return {};}
}
function saveCheck(folio,tipo,hora) {
  var d=loadChecks();
  d._fecha=getHoy();
  if(!d[folio])d[folio]={};
  d[folio][tipo]=hora;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
}
function showError(msg) {
  document.getElementById('loading').style.display='none';
  var el=document.getElementById('content');
  el.innerHTML='<div class="card" style="text-align:center;padding:30px;">'+
    '<div style="font-size:40px;margin-bottom:12px;">&#9888;&#65039;</div>'+
    '<div style="font-size:15px;font-weight:700;">'+msg+'</div></div>'+
    '<button class="btn" style="background:#E0E8F0;color:#6B7E93;" onclick="init()">&#128260; Reintentar</button>';
}
function setFolioActivo(el) { folioActivo=el.getAttribute('data-folio'); renderAll(); }
function irSiguiente(el) { folioActivo=el.getAttribute('data-folio'); renderAll(); }
function registrarCheck(tipo) {
  var hora=getHora();
  var btns=document.querySelectorAll('.btn-entrada,.btn-salida');
  btns.forEach(function(b){b.disabled=true;b.textContent='Registrando...';});
  saveCheck(folioActivo,tipo,hora);
  fetch(SCRIPT_URL+'?tipo=check_entrega&sucursal='+encodeURIComponent(SUCURSAL)+
    '&check='+tipo+'&hora='+encodeURIComponent(hora)+
    '&fechaHora='+encodeURIComponent(getFechaHora())+
    '&folio='+encodeURIComponent(folioActivo||''))
    .finally(function(){renderAll();});
}
function renderAll() {
  document.getElementById('loading').style.display='none';
  var checks=loadChecks();
  if(!pedidos.length){
    document.getElementById('content').innerHTML=
      '<div class="card" style="text-align:center;padding:30px;">'+
      '<div style="font-size:48px;margin-bottom:12px;">&#128237;</div>'+
      '<div style="font-size:17px;font-weight:700;margin-bottom:6px;">Sin pedidos pendientes</div>'+
      '<div style="font-size:13px;color:#6B7E93;">No hay solicitudes activas para Paseo Jardines.</div></div>'+
      '<button class="btn" style="background:#E0E8F0;color:#6B7E93;" onclick="init()">&#128260; Actualizar</button>';
    return;
  }
  var h='';
  if(pedidos.length>1){
    h+='<div class="sdp-tab">';
    pedidos.forEach(function(p){
      var c=checks[p.folio]||{};
      var isDone=c.entrada&&c.salida;
      var isActive=folioActivo===p.folio;
      h+='<button class="sdp-tab-btn'+(isActive?' active':(isDone?' done':''))+
        '" data-folio="'+p.folio+'" onclick="setFolioActivo(this)">'+p.folio+'</button>';
    });
    h+='</div>';
  }
  var p=pedidos.find(function(x){return x.folio===folioActivo;})||pedidos[0];
  var c=checks[p.folio]||{};
  h+='<div class="card">'+
    '<div class="card-title">Pedido en entrega</div>'+
    '<div class="folio">'+p.folio+'</div>'+getBadge(p.folio)+
    '<div class="row"><span class="row-lbl">Sucursal</span><span class="row-val">Paseo Jardines</span></div>'+
    '<div class="row"><span class="row-lbl">Fecha SDP</span><span class="row-val">'+p.fecha+'</span></div>'+
    '<div class="row"><span class="row-lbl">Entrega</span><span class="row-val">'+p.fechaEntrega+'</span></div>'+
    '<div class="row"><span class="row-lbl">Productos</span><span class="row-val">'+p.numProductos+'</span></div>'+
    '<div class="row"><span class="row-lbl">Total</span><span class="row-val" style="font-weight:700;color:#1D4F73;">'+fmtMoney(p.totalEstimado)+'</span></div>'+
    '</div>';
  h+='<div class="card">'+
    '<div class="card-title">Horarios</div>'+
    '<div class="check-row">'+
    '<div class="check-col"><div class="check-col-lbl">Llegada</div>'+
    (c.entrada?'<div class="check-col-val">'+c.entrada+'</div>':'<div style="color:#C5D3E0;">&#8212;</div>')+
    '</div>'+
    '<div class="check-col"><div class="check-col-lbl">Salida</div>'+
    (c.salida?'<div class="check-col-val">'+c.salida+'</div>':'<div style="color:#C5D3E0;">&#8212;</div>')+
    '</div></div>';
  if(!c.entrada){
    h+='<button class="btn btn-entrada" onclick="registrarCheck(&quot;entrada&quot;)">&#9989; Registrar Llegada</button>';
  }else if(!c.salida){
    h+='<div class="status-ok">'+
      '<div style="font-size:28px;margin-bottom:6px;">&#128994;</div>'+
      '<div style="font-size:15px;font-weight:700;color:#2E9E6B;">Llegada: '+c.entrada+'</div>'+
      '<div style="font-size:12px;color:#6B7E93;margin-top:4px;">Escanea al terminar</div></div>'+
      '<button class="btn btn-salida" onclick="registrarCheck(&quot;salida&quot;)">&#127937; Registrar Salida</button>';
  }else{
    h+='<div class="status-done">'+
      '<div style="font-size:28px;margin-bottom:6px;">&#9989;</div>'+
      '<div style="font-size:15px;font-weight:700;color:#1D4F73;">Entrega completada</div>'+
      '<div style="font-size:13px;color:#6B7E93;margin-top:4px;">'+
      'Llegada: <strong style="color:#2E9E6B;">'+c.entrada+'</strong> &nbsp;&middot;&nbsp; '+
      'Salida: <strong style="color:#E07B2A;">'+c.salida+'</strong></div></div>';
    var sig=pedidos.find(function(x){var cx=checks[x.folio]||{};return !cx.entrada;});
    if(sig){
      h+='<button class="btn" style="background:#E0E8F0;color:#1D4F73;font-weight:700;" '+
        'data-folio="'+sig.folio+'" onclick="irSiguiente(this)">Siguiente: '+sig.folio+' &rarr;</button>';
    }
  }
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}
function init() {
  document.getElementById('loading').style.display='block';
  document.getElementById('loading-msg').textContent='Buscando pedidos...';
  document.getElementById('content').innerHTML='';
  var done=false, seg=1;
  var timer=setTimeout(function(){
    if(!done){done=true;showError('Sin respuesta. Verifica internet.');}
  },20000);
  var cnt=setInterval(function(){
    if(done){clearInterval(cnt);return;}
    document.getElementById('loading-msg').textContent='Buscando pedidos... ('+seg+'s)';
    seg++;
  },1000);
  fetch(SCRIPT_URL+'?tipo=pedidos_pendientes&sucursal='+encodeURIComponent(SUCURSAL))
    .then(function(r){return r.json();})
    .then(function(data){
      if(done)return;
      done=true;clearTimeout(timer);clearInterval(cnt);
      // Exclude EN_RUTA - salida ya registrada, entrega completada
      pedidos=Array.isArray(data)?data.filter(function(p){ return p.estado!=='EN_RUTA'; }):[];
      if(pedidos.length){
        var chks=loadChecks();
        var first=pedidos.find(function(p){var c=chks[p.folio]||{};return !c.entrada;})||pedidos[0];
        folioActivo=first.folio;
      }
      renderAll();
    })
    .catch(function(){
      if(done)return;
      done=true;clearTimeout(timer);clearInterval(cnt);
      showError('Error de conexion.');
    });
}
setInterval(function(){
  var chks=loadChecks();
  var inc=pedidos.some(function(p){var c=chks[p.folio]||{};return !c.salida;});
  if(inc||!pedidos.length)init();
},30000);
init();
</script>
</body>
</html>
